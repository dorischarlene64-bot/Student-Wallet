<!Doctype html>
<html>
<head>
<title> Registration Page </title>
<style>
  /* This centers everything on the screen perfectly */
  html, body {
    height: 100%;
    margin: 0;
    display: grid;
    place-items: center;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
  }

  /* The white box for the form */
  .box {
    background: white;
    padding: 30px;
    border: 2px solid #333;
    text-align: center;
    border-radius: 8px; /* Smooths the corners */
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  /* Styling the inputs to be neat and stacked */
  input {
    margin: 10px 0;
    padding: 10px;
    width: 250px;
    display: block;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  /* The Register Button */
  .register-btn {
    background-color: #28a745; /* Green color for 'success' or 'create' */
    color: white;
    padding: 10px;
    width: 100%;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  }

  .register-btn:hover {
    background-color: #218838;
  }                  
</style>
</head>
<body>
<div class="box">
  <fieldset>
    <legend><b>Student Registration</b></legend>
    <form action="register_process.php" method="POST">
    <input type="text" placeholder="Full Name"  name="Full_Name"required>
    <input type="text" placeholder="University ID"  name="University_ID" required>
    <input type="password" placeholder="Create Password"  name="Password" required>
    
    <button class="register-btn">Create Wallet</button>
	</form>
  </fieldset>
  
  <p style="font-size: 0.8em;">
    Already have a wallet? 
<a href="login.html" target="_blank">Login here</a>
  </p>
</div>
</body>
</html>
